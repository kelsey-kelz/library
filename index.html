<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>

    <h1>Page Turners Paradise</h1>
    
    <button id="new-book">New Book</button>

    <div id="book-form">
        <form action="" id="book-form-inner">
            <label for="title">Title: </label>  
            <input type="text" id="title" placeholder="The Book Title..." name="title" required>
            <label for="author">Author: </label>
            <input type="text" id="author" placeholder="Author Name" name="author" required>
            <label for="pages">Pages: </label>
            <input type="number" id="pages" placeholder="123" name="pages" required>
            <label for="read-status">Read Status: </label>
            <select name="option" id="read-status">
                <option value="Read">Read</option>
                <option value="Not-Read-Yet">Not Read Yet</option>
            </select>
            <button id="submit-book-btn">Add Book</button>
        </form>
    </div>

    <div id="list"></div>

    <script src="./script.js"></script>
</body>
</html>
